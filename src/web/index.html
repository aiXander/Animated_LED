<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>aaiLED — surface v2</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="theme-color" content="#050505" />
  <link rel="manifest" href="/manifest.webmanifest" crossorigin="use-credentials" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #050505;
      --panel: #0c0c0c;
      --line: #1a1a1a;
      --line-bright: #2a2a2a;
      --text: #ddd;
      --dim: #888;
      --accent: #93c5fd;
      --accent-strong: #3b82f6;
      --accent-bg: #1e3a8a;
      --warn: #fbbf24;
      --bad: #f87171;
      --ok: #4ade80;
      font-size: clamp(14px, 1.1vmin + 5px, 18px);
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; height: 100%; background: var(--bg); color: var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      overflow: hidden;
    }
    button {
      background: #161616; color: var(--text); border: 1px solid var(--line-bright);
      border-radius: 4px; padding: 0.3rem 0.7rem; cursor: pointer;
      font-family: inherit; font-size: 0.82rem;
      transition: background 0.1s, border-color 0.1s, color 0.1s;
    }
    button:hover:not(:disabled) { background: #1e1e1e; border-color: #3a3a3a; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    button.primary { background: var(--accent-bg); border-color: var(--accent-strong); color: #dbeafe; }
    button.primary:hover:not(:disabled) { background: #1d4ed8; }
    button.danger { color: #fca5a5; border-color: #7a1a1a; }
    button.danger:hover:not(:disabled) { background: #2a0a0a; }
    button.ghost { background: transparent; border-color: transparent; color: var(--dim); }
    button.ghost:hover:not(:disabled) { background: #161616; color: var(--text); }
    input, select, textarea {
      font-family: inherit; font-size: 0.82rem;
      background: #0a0a0a; color: var(--text);
      border: 1px solid var(--line-bright); border-radius: 3px;
      padding: 0.25rem 0.45rem;
    }
    input[type="range"] { padding: 0; -webkit-appearance: none; height: 4px; background: #222; border: none; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: var(--accent-strong); border-radius: 50%; cursor: pointer; }
    input[type="color"] { padding: 0; height: 24px; width: 38px; cursor: pointer; }
    a { color: var(--accent); text-decoration: none; }

    #app { display: grid; grid-template-rows: auto 1fr; height: 100%; }

    #topbar {
      display: flex; gap: 0.6rem; align-items: center;
      padding: 0.4rem 0.7rem; border-bottom: 1px solid var(--line);
      background: var(--panel); flex-wrap: wrap; position: relative;
    }
    #topbar .group { display: flex; align-items: center; gap: 0.5rem; }
    #mode-toggle {
      display: flex; background: #161616; border: 1px solid var(--line-bright);
      border-radius: 4px; overflow: hidden;
    }
    #mode-toggle button {
      border: 0; border-radius: 0; padding: 0.3rem 0.9rem;
      background: transparent; color: var(--dim);
    }
    #mode-toggle button.active { background: var(--accent-bg); color: #dbeafe; }
    .pill { padding: 0.2rem 0.55rem; border-radius: 999px; background: #161616;
            border: 1px solid var(--line-bright); font-size: 0.7rem; color: var(--dim); }
    .pill.ok { color: var(--ok); border-color: #1e3a1e; }
    .pill.bad { color: var(--bad); border-color: #5a1a1a; }
    .pill.warn { color: var(--warn); border-color: #5a3a0a; }

    .masters-row { display: flex; gap: 0.7rem; align-items: center; flex-wrap: wrap; }
    .masters-row label {
      display: flex; align-items: center; gap: 0.4rem; font-size: 0.72rem; color: var(--dim);
    }
    .masters-row input[type="range"] { width: 86px; }
    .masters-row .value { color: var(--text); font-size: 0.72rem; min-width: 2.2rem; text-align: right; }

    #main { display: grid;
            grid-template-columns: 1.4fr 0.85fr 0.85fr;
            grid-template-rows: 1fr;
            height: 100%; min-height: 0; }

    #col-viz { display: flex; flex-direction: column; min-width: 0; min-height: 0;
               border-right: 1px solid var(--line); background: var(--bg); }
    #col-comp { display: flex; flex-direction: column; min-width: 0; min-height: 0;
                border-right: 1px solid var(--line); background: var(--panel); }
    #col-side { display: flex; flex-direction: column; min-width: 0; min-height: 0;
                background: var(--panel); }

    .col-header {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.45rem 0.7rem; border-bottom: 1px solid var(--line);
      font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--dim); background: #0a0a0a;
    }
    .col-header .grow { flex: 1; }

    #viz { position: relative; flex: 1 1 auto; min-height: 0; }
    #canvas { display: block; width: 100%; height: 100%; }
    #cal-banner {
      position: absolute; top: 0.5rem; right: 0.5rem;
      padding: 0.3rem 0.6rem; background: rgba(127, 29, 29, 0.85);
      border: 1px solid #b91c1c; border-radius: 4px;
      color: #fee2e2; font-size: 0.72rem; display: none;
    }
    #cal-banner button {
      margin-left: 0.4rem; background: #b91c1c; color: #fee2e2; border: 0;
      padding: 0.15rem 0.4rem; border-radius: 3px; cursor: pointer;
    }

    .deck { flex: 1 1 0; min-height: 0; display: flex; flex-direction: column;
            border-bottom: 1px solid var(--line); }
    .deck:last-child { border-bottom: none; }
    .deck-header { display: flex; align-items: center; gap: 0.4rem; padding: 0.4rem 0.7rem;
                   border-bottom: 1px solid var(--line); }
    .deck-header .name { font-size: 0.78rem; letter-spacing: 0.06em; text-transform: uppercase; }
    .deck-header .name.live { color: #fca5a5; }
    .deck-header .name.preview { color: #93c5fd; }
    .deck-header .grow { flex: 1; }
    .layer-list { flex: 1; overflow-y: auto; padding: 0.3rem 0.4rem; min-height: 0; }
    .layer-row {
      display: flex; align-items: center; gap: 0.35rem;
      padding: 0.3rem 0.4rem; margin-bottom: 0.2rem;
      border: 1px solid var(--line-bright); border-radius: 3px;
      background: #0a0a0a; cursor: pointer;
    }
    .layer-row:hover { background: #131313; }
    .layer-row.selected { border-color: var(--accent-strong);
                          background: rgba(59, 130, 246, 0.08); }
    .layer-row.disabled { opacity: 0.4; }
    .layer-row .idx { font-size: 0.65rem; color: var(--dim); min-width: 1rem; }
    .layer-row .name { flex: 1; font-size: 0.78rem; min-width: 0;
                       overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .layer-row .blend { font-size: 0.65rem; color: var(--dim); }
    .layer-row .opacity { font-size: 0.65rem; color: var(--dim); min-width: 2.4rem; text-align: right; }
    .deck-actions { display: flex; gap: 0.3rem; padding: 0.35rem 0.7rem;
                    border-top: 1px solid var(--line); }
    .deck-empty { padding: 1rem; color: var(--dim); font-size: 0.78rem; text-align: center; }

    .panel-section { border-bottom: 1px solid var(--line); }
    .panel-section .body { padding: 0.5rem 0.7rem; }
    .params-form { display: flex; flex-direction: column; gap: 0.4rem; padding: 0.5rem 0.7rem; }
    .param-row { display: grid; grid-template-columns: minmax(7rem, 1fr) auto auto;
                 gap: 0.5rem; align-items: center; }
    .param-row label { font-size: 0.74rem; color: var(--dim); overflow: hidden; text-overflow: ellipsis; }
    .param-row .value { font-size: 0.72rem; color: var(--text); min-width: 2.5rem; text-align: right; }
    .params-empty { color: var(--dim); font-size: 0.78rem; padding: 0.4rem 0.7rem; }

    .layer-meta-row { display: flex; gap: 0.4rem; align-items: center; flex-wrap: wrap;
                      padding: 0.35rem 0.7rem; border-bottom: 1px solid var(--line);
                      background: #0a0a0a; font-size: 0.72rem; color: var(--dim); }
    .layer-meta-row select { font-size: 0.72rem; padding: 0.15rem 0.3rem; }
    .layer-meta-row input[type="range"] { width: 70px; }

    #chat { display: flex; flex-direction: column; flex: 1; min-height: 0; }
    #chat-log { flex: 1; overflow-y: auto; padding: 0.5rem 0.7rem;
                display: flex; flex-direction: column; gap: 0.4rem; min-height: 0; }
    .msg { padding: 0.4rem 0.55rem; border-radius: 4px; font-size: 0.78rem;
           white-space: pre-wrap; word-break: break-word; line-height: 1.45; }
    .msg.user { background: rgba(59, 130, 246, 0.12); border: 1px solid #1e3a8a; }
    .msg.assistant { background: #131313; border: 1px solid var(--line-bright); }
    .msg.tool-error { background: rgba(127, 29, 29, 0.18); border: 1px solid #5a1a1a;
                      color: #fda4af; font-size: 0.72rem; }
    .msg.tool-ok { background: rgba(20, 83, 45, 0.18); border: 1px solid #1e3a1e;
                   color: #86efac; font-size: 0.72rem; }
    .msg .label { font-size: 0.6rem; color: var(--dim); margin-bottom: 0.2rem; text-transform: uppercase; letter-spacing: 0.1em; }
    #chat-input-row { display: flex; gap: 0.3rem; padding: 0.5rem 0.7rem;
                      border-top: 1px solid var(--line); }
    #chat-input { flex: 1; resize: none; min-height: 2.4rem; max-height: 6rem; }

    #lib { position: absolute; right: 0.5rem; top: 2.6rem; width: 22rem; max-height: 60vh;
           background: var(--panel); border: 1px solid var(--line-bright); border-radius: 5px;
           padding: 0.5rem; overflow-y: auto; display: none; z-index: 30;
           box-shadow: 0 6px 24px rgba(0,0,0,0.5); }
    #lib.open { display: block; }
    .lib-row { padding: 0.4rem 0.5rem; border-bottom: 1px solid var(--line);
               display: grid; grid-template-columns: 1fr auto; gap: 0.4rem;
               align-items: center; cursor: pointer; }
    .lib-row:hover { background: #131313; }
    .lib-row .summary { font-size: 0.72rem; color: var(--dim);
                        overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .lib-row .actions { display: flex; gap: 0.25rem; }
    .lib-row .actions button { padding: 0.15rem 0.35rem; font-size: 0.7rem; }

    body.live-mode #col-side { display: none; }
    body.live-mode #main { grid-template-columns: 1.6fr 1fr; }
  </style>
</head>
<body class="live-mode">
  <div id="app">
    <header id="topbar">
      <div class="group">
        <strong style="color:#fca5a5;letter-spacing:0.05em">aaiLED</strong>
        <span class="pill" id="ws-pill">connecting…</span>
        <span class="pill" id="fps-pill">--- fps</span>
        <span class="pill" id="audio-pill">audio …</span>
      </div>
      <div class="group">
        <div id="mode-toggle">
          <button id="btn-design" data-mode="design">Design</button>
          <button id="btn-live" data-mode="live" class="active">Live</button>
        </div>
      </div>
      <div class="group masters-row" id="masters-row">
        <label>bri <input id="m-bri" type="range" min="0" max="2" step="0.01"><span class="value" id="v-bri">1.00</span></label>
        <label>sat <input id="m-sat" type="range" min="0" max="1" step="0.01"><span class="value" id="v-sat">1.00</span></label>
        <label>spd <input id="m-spd" type="range" min="0" max="3" step="0.01"><span class="value" id="v-spd">1.00</span></label>
        <label>aud <input id="m-aud" type="range" min="0" max="3" step="0.01"><span class="value" id="v-aud">1.00</span></label>
        <label><input id="m-frz" type="checkbox"> freeze</label>
      </div>
      <div class="group" style="margin-left:auto;">
        <button id="btn-blackout" class="ghost" title="Blackout the LIVE leg (sim still shows preview)">⚫ blackout</button>
        <button id="btn-library" class="ghost">📚 library</button>
        <a id="btn-audio" href="#" target="_blank" rel="noopener" class="ghost" style="display:inline-block; padding:0.3rem 0.7rem;">🎙 audio</a>
      </div>
      <div id="lib"></div>
    </header>

    <main id="main">
      <section id="col-viz">
        <div class="col-header">
          <span>Simulator</span>
          <span class="grow"></span>
          <span id="viz-mode-pill" class="pill">live</span>
        </div>
        <div id="viz">
          <canvas id="canvas"></canvas>
          <div id="cal-banner">
            <span id="cal-text">calibration</span>
            <button id="cal-clear">✕</button>
          </div>
        </div>
      </section>

      <section id="col-comp">
        <div class="col-header">
          <span>Compositions</span>
          <span class="grow"></span>
          <button id="btn-promote" class="primary">▶ Promote ⤴</button>
          <button id="btn-pull" class="ghost" title="Copy LIVE → PREVIEW (hard cut)">⤓ pull live</button>
        </div>

        <div class="deck" id="deck-preview">
          <div class="deck-header">
            <span class="name preview">PREVIEW</span>
            <span class="grow"></span>
            <span class="pill" id="preview-summary"></span>
          </div>
          <div class="layer-list" id="preview-layers"></div>
          <div class="deck-actions">
            <button id="preview-add-layer" class="ghost">+ layer</button>
            <button id="preview-remove-layer" class="ghost danger">– remove</button>
          </div>
        </div>

        <div class="deck" id="deck-live">
          <div class="deck-header">
            <span class="name live">LIVE</span>
            <span class="grow"></span>
            <span class="pill" id="live-summary"></span>
          </div>
          <div class="layer-list" id="live-layers"></div>
          <div class="deck-actions">
            <button id="live-add-layer" class="ghost">+ layer</button>
            <button id="live-remove-layer" class="ghost danger">– remove</button>
          </div>
        </div>
      </section>

      <section id="col-side">
        <div class="col-header">
          <span id="side-title">Selected layer</span>
          <span class="grow"></span>
          <span id="side-layer-name" class="pill"></span>
        </div>

        <div class="layer-meta-row" id="layer-meta-row">
          <span>blend</span>
          <select id="meta-blend">
            <option value="normal">normal</option>
            <option value="add">add</option>
            <option value="screen">screen</option>
            <option value="multiply">multiply</option>
          </select>
          <span>opacity</span>
          <input type="range" id="meta-opacity" min="0" max="1" step="0.01">
          <span class="value" id="meta-opacity-v">1.00</span>
          <label><input type="checkbox" id="meta-enabled"> on</label>
        </div>

        <div class="panel-section">
          <div class="params-form" id="params-form"></div>
        </div>

        <div id="chat" class="panel-section">
          <div class="col-header"><span>Chat (design)</span></div>
          <div id="chat-log"></div>
          <div id="chat-input-row">
            <textarea id="chat-input" placeholder="describe the effect you want…"></textarea>
            <button id="chat-send" class="primary">send</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="/lib/main-desktop.js"></script>
</body>
</html>
