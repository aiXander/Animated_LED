<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#050505" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>ledctl</title>
  <style>
    /* Mobile-first portrait UI. Single column. The masters panel and the
       layer list are the dominant surfaces — chat is one tab, layers the
       other. Everything else (engine stats, audio status) lives below
       the tabbed area in a small read-only panel.

       Sizes are in rem, anchored to a fixed root font-size so that thumb
       targets stay at a known physical size across phones; we don't scale
       the root with viewport here. */
    :root {
      color-scheme: dark;
      font-size: 16px;
      --tap: 2.75rem;            /* minimum tap target */
      --viz-h: 14svh;            /* short viz strip; svh handles iOS toolbar */
      --bg: #050505;
      --bg-elev: #0c0c0e;
      --border: #1f1f22;
      --border-strong: #2a2a30;
      --text: #ddd;
      --text-dim: #888;
      --accent: #93c5fd;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; height: 100%; background: var(--bg); color: var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      overscroll-behavior: none;
      -webkit-text-size-adjust: 100%;
    }
    body {
      /* dvh handles iOS Safari's collapsing toolbar so the bottom
         composer doesn't get clipped when the URL bar slides in/out. */
      min-height: 100dvh;
      display: flex; flex-direction: column;
      padding: max(env(safe-area-inset-top), 0px)
               max(env(safe-area-inset-right), 0px)
               max(env(safe-area-inset-bottom), 0px)
               max(env(safe-area-inset-left), 0px);
    }
    .ok  { color: #4ade80; }
    .bad { color: #f87171; }
    .warn { color: #fbbf24; }
    .dim { color: var(--text-dim); }
    a { color: var(--accent); text-decoration: none; }
    button, input, textarea, select {
      font-family: inherit; color: inherit;
    }

    /* ---- header ---- */
    header.appbar {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--border);
      background: var(--bg-elev);
    }
    header.appbar .title {
      font-weight: 600; color: var(--accent); letter-spacing: 0.04em;
    }
    header.appbar nav { display: flex; gap: 0.375rem; margin-left: auto; }
    header.appbar nav a {
      padding: 0.375rem 0.5rem; border: 1px solid var(--border-strong);
      border-radius: 0.375rem; font-size: 0.75rem; color: var(--text);
    }
    header.appbar nav a.active { background: #1e3a8a; border-color: #3b82f6; color: #dbeafe; }
    header.appbar #status-engine {
      font-size: 0.6875rem; padding: 0.25rem 0.5rem;
      border-radius: 999px; border: 1px solid var(--border-strong);
      background: rgba(0,0,0,0.35);
    }

    /* ---- viz (short strip; removed when transport excludes simulator) ---- */
    #viz {
      position: relative; width: 100%; height: var(--viz-h);
      border-bottom: 1px solid var(--border); background: #050505;
      flex: 0 0 auto;
    }
    #canvas { display: block; width: 100%; height: 100%; touch-action: manipulation; }
    #cal-banner {
      position: absolute; top: 0.5rem; right: 0.5rem;
      padding: 0.25rem 0.5rem; background: rgba(127,29,29,0.85);
      border: 1px solid #b91c1c; border-radius: 0.375rem; color: #fee2e2;
      font-size: 0.625rem; display: none;
    }
    #cal-banner button {
      margin-left: 0.375rem; background: #b91c1c; color: #fee2e2; border: 0;
      padding: 0.125rem 0.375rem; border-radius: 0.1875rem; font-size: 0.625rem;
    }
    #ws-pill {
      position: absolute; top: 0.5rem; left: 0.5rem;
      font-size: 0.625rem; padding: 0.125rem 0.4375rem;
      border-radius: 999px; border: 1px solid #333;
      background: rgba(0,0,0,0.5);
    }

    /* ---- masters: the most important surface on phone ----
       Tightened by ~25% (vertical spacing, slider track, thumb, toggle
       buttons) to free up space for the layers / chat panels below. */
    section#masters {
      flex: 0 0 auto;
      padding: 0.46875rem 0.75rem 0.375rem;
      background: var(--bg-elev);
      border-bottom: 1px solid var(--border);
    }
    section#masters h3 {
      margin: 0 0 0.28125rem; font-size: 0.625rem; color: #fbbf24;
      text-transform: uppercase; letter-spacing: 0.08em;
    }
    .master-row {
      display: grid; grid-template-columns: 5.25rem 1fr 2.75rem;
      align-items: center; column-gap: 0.5rem;
      padding: 0.140625rem 0;
    }
    .master-row > label {
      font-size: 0.75rem; opacity: 0.75;
    }
    .master-row .v {
      font-size: 0.75rem; text-align: right;
      font-variant-numeric: tabular-nums; opacity: 0.85;
    }
    .master-row input[type=range] {
      -webkit-appearance: none; appearance: none;
      width: 100%; height: 1.3125rem; background: transparent;
      accent-color: var(--accent);
    }
    .master-row input[type=range]::-webkit-slider-runnable-track {
      height: 0.28125rem; background: #1a1a1a; border-radius: 999px;
      border: 1px solid #2a2a2a;
    }
    .master-row input[type=range]::-moz-range-track {
      height: 0.28125rem; background: #1a1a1a; border-radius: 999px;
      border: 1px solid #2a2a2a;
    }
    /* Thumb is 1.125rem; track is 0.28125rem. Margin centres the thumb
       on the track: -((1.125 - 0.28125)/2) = -0.421875rem. */
    .master-row input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 1.125rem; height: 1.125rem; margin-top: -0.421875rem;
      border-radius: 999px; background: #93c5fd;
      border: 2px solid #1e3a8a; box-shadow: 0 1px 2px rgba(0,0,0,0.6);
    }
    .master-row input[type=range]::-moz-range-thumb {
      width: 1.125rem; height: 1.125rem; border-radius: 999px;
      background: #93c5fd; border: 2px solid #1e3a8a;
    }

    /* Action buttons (freeze, blackout) — tactile pill with a status LED
       dot, an inset highlight, and a glow when 'on'. The full-radius pill
       and the dot deliberately make these read as press-to-toggle actions,
       not navigation. */
    .toggle-row {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 0.5rem; margin-top: 0.4375rem;
    }
    .toggle-row button {
      display: flex; align-items: center; justify-content: center; gap: 0.4375rem;
      min-height: 2.25rem;
      background: linear-gradient(180deg, #1a1a1c, #0e0e10);
      color: var(--text);
      border: 1px solid #333;
      border-radius: 999px;
      font-size: 0.8125rem; font-weight: 600; letter-spacing: 0.05em;
      cursor: pointer;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05),
                  0 1px 2px rgba(0,0,0,0.55);
      transition: background 0.15s, border-color 0.15s,
                  box-shadow 0.15s, color 0.15s;
    }
    /* Status LED dot — dim grey when off, lit + glowing when on. */
    .toggle-row button::before {
      content: ""; width: 0.5rem; height: 0.5rem; border-radius: 999px;
      background: #3a3a3a;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.5);
      transition: background 0.15s, box-shadow 0.15s;
    }
    .toggle-row button:active {
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.6);
    }
    .toggle-row button.on {
      background: linear-gradient(180deg, #c2620a, #8a430a);
      border-color: #d97706; color: #fef3c7;
      box-shadow: 0 0 0 1px rgba(217,119,6,0.35),
                  0 0 10px rgba(217,119,6,0.35),
                  inset 0 1px 0 rgba(255,255,255,0.1);
    }
    .toggle-row button.on::before {
      background: #fef3c7;
      box-shadow: 0 0 6px rgba(254,243,199,0.8),
                  inset 0 0 0 1px rgba(0,0,0,0.15);
    }

    /* ---- tabs ----
       Flat segmented control: no button background, no pill, no border —
       just labels with an accent underline on the active one. Sits flush
       against the panel below so the active tab visually anchors its
       content (different visual language from the round action pills
       above). */
    nav.tabbar {
      display: flex;
      background: var(--bg-elev);
      border-top: 1px solid var(--border);
      flex: 0 0 auto;
    }
    nav.tabbar button {
      flex: 1;
      min-height: 2.5rem;
      background: transparent;
      border: 0;
      border-bottom: 2px solid transparent;
      color: var(--text-dim);
      font-size: 0.6875rem; font-weight: 600;
      letter-spacing: 0.12em; text-transform: uppercase;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    nav.tabbar button.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    nav.tabbar button:not(.active):active {
      color: var(--text);
    }

    .tab-panel { display: none; flex: 1 1 0; min-height: 0; }
    .tab-panel.active { display: flex; flex-direction: column; }

    /* ---- layers panel ---- */
    #panel-layers { flex-direction: column; }
    .panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--border);
      background: var(--bg-elev);
    }
    .panel-header h3 {
      margin: 0; font-size: 0.625rem; color: #fbbf24;
      text-transform: uppercase; letter-spacing: 0.08em;
    }
    .panel-header .h3-actions { display: flex; gap: 0.375rem; }
    .preset-btn {
      min-height: 2rem; padding: 0 0.625rem;
      background: #141414; color: #cbd5e1; border: 1px solid var(--border-strong);
      border-radius: 0.375rem; font-size: 0.625rem; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer;
    }
    .preset-btn.load { color: #a7f3d0; border-color: #1f3a36; }
    .preset-btn.save { color: #ddd6fe; border-color: #2a223a; }

    #layers-list {
      flex: 1; overflow-y: auto; padding: 0.5rem 0.75rem 0.75rem;
      -webkit-overflow-scrolling: touch;
    }
    .layer-row {
      position: relative;
      padding: 0.5rem 0.625rem; margin: 0.375rem 0;
      border-radius: 0.5rem; border: 1px solid var(--border);
      font-size: 0.75rem;
      user-select: none; touch-action: pan-y; overflow: hidden;
      min-height: var(--tap);
      --op: 100%;
      background: linear-gradient(
        to right,
        rgba(59,130,246,0.32) 0,
        rgba(59,130,246,0.32) var(--op),
        rgba(20,20,20,0.7) var(--op),
        rgba(20,20,20,0.7) 100%
      );
    }
    .layer-row.dragging { border-color: #3b82f6; }
    .layer-row > * { position: relative; pointer-events: none; }
    .layer-row .head {
      display: flex; align-items: center; gap: 0.375rem;
    }
    .layer-row .name {
      color: #dbeafe; font-weight: 600;
      flex: 1 1 auto; min-width: 0;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .layer-row .op-num {
      position: absolute; left: 50%; bottom: 0.25rem;
      transform: translateX(-50%);
      font-variant-numeric: tabular-nums;
      background: rgba(20,20,20,0.6); padding: 0 0.3125rem;
      border-radius: 0.1875rem; font-size: 0.6875rem;
    }
    .layer-row .blend { opacity: 0.55; font-size: 0.6875rem; margin-top: 0.125rem; }
    .layer-row .remove {
      pointer-events: auto;
      width: 2rem; height: 2rem; min-width: 2rem;
      background: transparent; border: 1px solid #3a1a1a; color: #f87171;
      border-radius: 0.375rem; font-size: 1rem; line-height: 1;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }

    /* ---- chat panel ---- */
    #panel-chat { flex-direction: column; }
    #log {
      flex: 1; overflow-y: auto; padding: 0.625rem 0.75rem;
      -webkit-overflow-scrolling: touch;
    }
    .turn { margin-bottom: 0.625rem; }
    .bubble {
      padding: 0.5rem 0.625rem; border-radius: 0.625rem;
      max-width: 92%; white-space: pre-wrap; word-break: break-word;
      line-height: 1.4; font-size: 0.8125rem;
    }
    .row { display: flex; }
    .user.row { justify-content: flex-end; }
    .asst.row { justify-content: flex-start; }
    .user .bubble { background: #1e3a8a; color: #dbeafe; margin-left: auto; }
    .asst .bubble { background: #161616; border: 1px solid var(--border-strong); }
    .meta { font-size: 0.625rem; opacity: 0.55; margin-top: 0.25rem; }
    .toolblock { margin-top: 0.25rem; font-size: 0.6875rem; }
    .toolblock summary { cursor: pointer; opacity: 0.75; }
    .toolblock pre {
      background: #0c0c0c; border: 1px solid #222; border-radius: 0.375rem;
      padding: 0.5rem; overflow-x: auto; max-height: 30vh;
    }

    .composer-bar {
      border-top: 1px solid var(--border); padding: 0.5rem 0.625rem;
      background: var(--bg-elev);
      display: flex; gap: 0.5rem; align-items: flex-end;
    }
    .composer-bar #input {
      flex: 1; background: #0a0a0a; color: #eee;
      border: 1px solid #333; border-radius: 0.5rem;
      padding: 0.5rem 0.625rem; font-size: 0.875rem;
      resize: none; min-height: var(--tap); max-height: 40vh;
    }
    .composer-bar #send {
      background: #1e40af; color: white; border: 0;
      border-radius: 0.5rem; padding: 0 0.875rem;
      font-weight: 600; cursor: pointer;
      min-height: var(--tap); min-width: 4rem;
    }
    .composer-bar #send:disabled { opacity: 0.5; }
    .chat-meta {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.25rem 0.75rem; font-size: 0.6875rem; opacity: 0.7;
      background: var(--bg-elev); border-bottom: 1px solid var(--border);
    }
    .chat-meta button {
      background: #111; color: var(--text); border: 1px solid var(--border-strong);
      border-radius: 0.375rem; padding: 0.25rem 0.5rem; font-size: 0.6875rem;
      cursor: pointer;
    }

    /* ---- modals ---- */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.65);
      display: none; align-items: stretch; justify-content: stretch;
      z-index: 100;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      width: 100%; height: 100%;
      background: #0e0e10; border: 0; border-radius: 0;
      display: flex; flex-direction: column;
      padding: 1rem 1rem max(1rem, env(safe-area-inset-bottom));
    }
    .modal h2 {
      margin: 0 0 0.625rem; font-size: 0.8125rem; color: var(--accent);
      text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600;
    }
    .modal .body {
      flex: 1; min-height: 0; display: flex; flex-direction: column; gap: 0.625rem;
    }
    .modal .row { display: flex; gap: 0.625rem; align-items: center; }
    .modal input[type=text] {
      flex: 1; background: #0a0a0a; color: #eee; border: 1px solid #333;
      border-radius: 0.5rem; padding: 0.625rem 0.75rem;
      font-size: 0.9375rem; min-height: var(--tap);
    }
    .modal input[type=text]:focus { outline: none; border-color: #7c3aed; }
    .modal .footer {
      display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 0.625rem;
    }
    .modal button {
      background: #1a1a1a; color: var(--text); border: 1px solid var(--border-strong);
      border-radius: 0.5rem; padding: 0.625rem 1rem; font-size: 0.875rem;
      cursor: pointer; min-height: var(--tap);
    }
    .modal button.primary { background: #1e40af; border-color: #2563eb; color: #dbeafe; }
    .modal .err { color: #f87171; font-size: 0.75rem; min-height: 1rem; }
    .modal .hint { font-size: 0.75rem; opacity: 0.6; }

    .preset-list {
      flex: 1; overflow-y: auto; border: 1px solid var(--border);
      border-radius: 0.5rem; background: #050505; padding: 0.25rem;
      min-height: 0;
    }
    .preset-list .preset-item {
      padding: 0.75rem 0.875rem; border-radius: 0.375rem; cursor: pointer;
      font-size: 0.875rem; line-height: 1.3; min-height: var(--tap);
      display: flex; align-items: center;
    }
    .preset-list .preset-item.selected { background: #1e3a8a; color: #dbeafe; }
    .preset-list .empty { padding: 0.75rem; opacity: 0.5; font-size: 0.75rem; }

    .modal label.checkbox {
      display: flex; align-items: center; gap: 0.5rem;
      font-size: 0.875rem; cursor: pointer; user-select: none;
    }
    .modal label.checkbox input { width: 1.125rem; height: 1.125rem; accent-color: #7c3aed; }
  </style>
</head>
<body>
  <header class="appbar">
    <span class="title">ledctl</span>
    <span id="status-engine" class="dim">connecting…</span>
    <nav>
      <a href="/?desktop=1">desktop</a>
      <a href="/editor">layout</a>
      <a href="#" id="audio-ui-link" title="opens the audio-feature server UI in a new tab">audio</a>
    </nav>
  </header>

  <div id="viz">
    <canvas id="canvas"></canvas>
    <div id="cal-banner">
      <span id="cal-text">calibration active</span>
      <button id="cal-clear">clear</button>
    </div>
  </div>

  <section id="masters">
    <h3>masters</h3>
    <div class="master-row">
      <label for="m-brightness">brightness</label>
      <input type="range" id="m-brightness" min="0" max="2" step="0.01" value="1" />
      <span class="v" id="m-brightness-v">1.00</span>
    </div>
    <div class="master-row">
      <label for="m-speed">speed</label>
      <input type="range" id="m-speed" min="0" max="3" step="0.01" value="1" />
      <span class="v" id="m-speed-v">1.00</span>
    </div>
    <div class="master-row">
      <label for="m-audio-reactivity">audio react</label>
      <input type="range" id="m-audio-reactivity" min="0" max="3" step="0.01" value="1" />
      <span class="v" id="m-audio-reactivity-v">1.00</span>
    </div>
    <div class="master-row">
      <label for="m-saturation">saturation</label>
      <input type="range" id="m-saturation" min="0" max="1" step="0.01" value="1" />
      <span class="v" id="m-saturation-v">1.00</span>
    </div>
    <div class="master-row">
      <label for="m-crossfade">crossfade</label>
      <input type="range" id="m-crossfade" min="0" max="5" step="0.05" value="1" />
      <span class="v" id="m-crossfade-v">1.00s</span>
    </div>
    <div class="toggle-row">
      <button id="m-freeze" type="button">freeze</button>
      <button id="m-blackout" type="button">blackout</button>
    </div>
  </section>

  <nav class="tabbar" role="tablist">
    <button data-tab="layers" class="active" role="tab" aria-selected="true">layers</button>
    <button data-tab="chat" role="tab" aria-selected="false">chat</button>
  </nav>

  <section id="panel-layers" class="tab-panel active" data-tab="layers">
    <div class="panel-header">
      <h3>layers</h3>
      <span class="h3-actions">
        <button class="preset-btn save" id="save-preset-btn" type="button">save</button>
        <button class="preset-btn load" id="load-preset-btn" type="button">load</button>
      </span>
    </div>
    <div id="layers-list"><div class="dim">—</div></div>
  </section>

  <section id="panel-chat" class="tab-panel" data-tab="chat">
    <div class="chat-meta">
      <span id="chat-status" class="dim">ready</span>
      <button id="new" type="button">new session</button>
    </div>
    <div id="log"></div>
    <form class="composer-bar" id="form">
      <textarea id="input" rows="1" placeholder="warm slow ambient drift…"></textarea>
      <button id="send" type="submit">send</button>
    </form>
  </section>

  <!-- The desktop UI's bottom info strip (fps/leds/transport/audio meter)
       is intentionally absent on mobile — every pixel below the tabs goes
       to the layers/chat panels. The header still surfaces the connection
       state via #status-engine. -->

  <!-- ===== save preset modal ===== -->
  <div class="modal-overlay" id="save-modal">
    <div class="modal" role="dialog" aria-labelledby="save-title">
      <h2 id="save-title">save preset</h2>
      <div class="body">
        <div class="row">
          <input type="text" id="save-name" maxlength="40"
                 placeholder="preset name (max 40 chars)" autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false" />
        </div>
        <div class="hint">letters, digits, _ and - only · saves current layer stack and master settings</div>
        <div class="err" id="save-err"></div>
      </div>
      <div class="footer">
        <button type="button" id="save-cancel">cancel</button>
        <button type="button" class="primary" id="save-confirm">save</button>
      </div>
    </div>
  </div>

  <!-- ===== load preset modal ===== -->
  <div class="modal-overlay" id="load-modal">
    <div class="modal" role="dialog" aria-labelledby="load-title">
      <h2 id="load-title">load preset</h2>
      <div class="body">
        <div class="preset-list" id="preset-list">
          <div class="empty">loading…</div>
        </div>
        <label class="checkbox">
          <input type="checkbox" id="load-with-masters" />
          <span>load master settings</span>
        </label>
        <div class="err" id="load-err"></div>
      </div>
      <div class="footer">
        <button type="button" id="load-cancel">cancel</button>
        <button type="button" class="primary" id="load-confirm">load</button>
      </div>
    </div>
  </div>

  <script src="/audio-meter.js"></script>
  <script type="module" src="/lib/main-mobile.js"></script>
</body>
</html>
