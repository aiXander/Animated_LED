<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ledctl layout editor</title>
  <style>
    :root { color-scheme: dark; }
    html, body { margin: 0; height: 100%; background: #050505; color: #ddd;
                  font-family: ui-monospace, SFMono-Regular, Menlo, monospace; overflow: hidden; }
    #app { display: grid; grid-template-columns: 1fr 360px; height: 100%; }
    #canvas-wrap { position: relative; overflow: hidden; }
    canvas { display: block; }
    #side {
      border-left: 1px solid #1a1a1a; background: #0a0a0a; padding: 14px;
      overflow-y: auto; font-size: 12px; line-height: 1.5;
    }
    #side h1 { font-size: 13px; margin: 0 0 8px; color: #93c5fd; }
    #side h2 { font-size: 12px; margin: 16px 0 6px; color: #fbbf24; }
    a { color: #93c5fd; }
    .strip-card {
      border: 1px solid #222; border-radius: 6px; padding: 8px; margin-bottom: 8px;
      background: rgba(20, 20, 20, 0.6);
    }
    .strip-card.selected { border-color: #4ade80; }
    .strip-card label { display: block; opacity: 0.6; margin-top: 6px; }
    .strip-card input[type=text], .strip-card input[type=number] {
      width: 100%; box-sizing: border-box; background: #050505; border: 1px solid #222;
      color: #ddd; padding: 4px 6px; font-family: inherit; font-size: 11px; border-radius: 3px;
    }
    .strip-card .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .strip-card .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px; }
    .strip-card .header { display: flex; align-items: center; gap: 8px; }
    .strip-card .swatch { width: 10px; height: 10px; border-radius: 50%; }
    .strip-card .id-input { flex: 1; }
    .actions { position: sticky; bottom: -14px; padding: 10px 0; background: #0a0a0a;
                border-top: 1px solid #1a1a1a; margin-top: 14px; }
    button {
      background: #1f2937; color: #ddd; border: 1px solid #374151; padding: 6px 12px;
      border-radius: 4px; font-family: inherit; font-size: 12px; cursor: pointer;
    }
    button:hover { background: #374151; }
    button.primary { background: #15803d; border-color: #16a34a; color: #f0fdf4; }
    button.primary:hover { background: #16a34a; }
    button.danger { background: #7f1d1d; border-color: #b91c1c; color: #fee2e2; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #status { font-size: 11px; padding: 6px 0; }
    #status.ok { color: #4ade80; }
    #status.bad { color: #f87171; }
    #status.warn { color: #fbbf24; }
    pre.diff {
      background: #050505; border: 1px solid #222; padding: 8px; font-size: 11px;
      max-height: 240px; overflow: auto; white-space: pre-wrap; border-radius: 4px;
    }
    pre.diff .add { color: #4ade80; }
    pre.diff .del { color: #f87171; }
    .help { color: #888; font-size: 11px; }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-wrap">
      <canvas id="canvas"></canvas>
    </div>
    <div id="side">
      <h1>ledctl · layout editor</h1>
      <div class="help">
        Drag <b>endpoints</b> to move them. Click a strip to select it and edit numerically.
        <a href="/">← back to live view</a>
      </div>
      <h2>strips</h2>
      <div id="strips"></div>
      <div class="actions">
        <div id="status" class="help">loaded</div>
        <button id="btn-revert">revert</button>
        <button id="btn-preview">preview diff</button>
        <button id="btn-save" class="primary">save &amp; reload</button>
        <h2>diff (vs current)</h2>
        <pre class="diff" id="diff">— click "preview diff" —</pre>
      </div>
    </div>
  </div>
<script>
(() => {
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d", { alpha: false });
  const wrap = document.getElementById("canvas-wrap");
  const stripsDiv = document.getElementById("strips");
  const statusEl = document.getElementById("status");
  const diffEl = document.getElementById("diff");

  // Server config: only the strips section is editable in v1.
  let baseConfig = null;     // last-known on-server config (full)
  let strips = [];           // editable copy of strips list (mutable)
  let bbox = { min: [-15, -1, 0], max: [15, 1, 0] };
  let selectedIdx = -1;

  // Drag state
  let drag = null;           // { stripIdx, end: 'start'|'end' }

  // Colour per strip (stable; helps spot which is which).
  const PALETTE = ["#60a5fa", "#fbbf24", "#34d399", "#f472b6", "#a78bfa", "#f87171", "#22d3ee", "#facc15"];
  const colorFor = (i) => PALETTE[i % PALETTE.length];

  function setStatus(text, kind) {
    statusEl.textContent = text;
    statusEl.className = kind || "help";
  }

  function resize() {
    const dpr = window.devicePixelRatio || 1;
    canvas.width  = Math.floor(wrap.clientWidth  * dpr);
    canvas.height = Math.floor(wrap.clientHeight * dpr);
    canvas.style.width  = wrap.clientWidth + "px";
    canvas.style.height = wrap.clientHeight + "px";
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    draw();
  }
  window.addEventListener("resize", resize);

  // Bbox spans the strips' positions; gives a 2-axis layout in metres.
  function computeBbox() {
    if (!strips.length) return;
    let xs = [], ys = [];
    for (const s of strips) {
      xs.push(s.geometry.start[0], s.geometry.end[0]);
      ys.push(s.geometry.start[1], s.geometry.end[1]);
    }
    const pad = 1.0; // metres of padding so endpoints aren't on the canvas edge
    bbox.min = [Math.min(...xs) - pad, Math.min(...ys) - pad, 0];
    bbox.max = [Math.max(...xs) + pad, Math.max(...ys) + pad, 0];
    if (bbox.max[0] - bbox.min[0] < 1) { bbox.min[0] -= 1; bbox.max[0] += 1; }
    if (bbox.max[1] - bbox.min[1] < 1) { bbox.min[1] -= 1; bbox.max[1] += 1; }
  }

  function project(p) {
    const margin = 40;
    const ww = wrap.clientWidth - 2 * margin;
    const hh = wrap.clientHeight - 2 * margin;
    const dx = bbox.max[0] - bbox.min[0] || 1;
    const dy = bbox.max[1] - bbox.min[1] || 1;
    const s = Math.min(ww / dx, hh / dy);
    const cx = wrap.clientWidth / 2;
    const cy = wrap.clientHeight / 2;
    const ox = (bbox.min[0] + bbox.max[0]) / 2;
    const oy = (bbox.min[1] + bbox.max[1]) / 2;
    return [cx + (p[0] - ox) * s, cy - (p[1] - oy) * s, s];
  }

  // Inverse project for drag: screen px -> metres (only x,y; z preserved).
  function unproject(px, py, zKeep) {
    const margin = 40;
    const ww = wrap.clientWidth - 2 * margin;
    const hh = wrap.clientHeight - 2 * margin;
    const dx = bbox.max[0] - bbox.min[0] || 1;
    const dy = bbox.max[1] - bbox.min[1] || 1;
    const s = Math.min(ww / dx, hh / dy);
    const cx = wrap.clientWidth / 2;
    const cy = wrap.clientHeight / 2;
    const ox = (bbox.min[0] + bbox.max[0]) / 2;
    const oy = (bbox.min[1] + bbox.max[1]) / 2;
    return [(px - cx) / s + ox, -(py - cy) / s + oy, zKeep];
  }

  function drawGrid() {
    ctx.fillStyle = "#050505";
    ctx.fillRect(0, 0, wrap.clientWidth, wrap.clientHeight);
    // metre grid
    const [, , scale] = project([0, 0, 0]);
    const stepWorld = 1.0;
    if (scale * stepWorld > 8) {
      ctx.strokeStyle = "#111";
      ctx.lineWidth = 1;
      ctx.beginPath();
      for (let x = Math.floor(bbox.min[0]); x <= Math.ceil(bbox.max[0]); x++) {
        const [sx] = project([x, 0, 0]);
        ctx.moveTo(sx, 0); ctx.lineTo(sx, wrap.clientHeight);
      }
      for (let y = Math.floor(bbox.min[1]); y <= Math.ceil(bbox.max[1]); y++) {
        const [, sy] = project([0, y, 0]);
        ctx.moveTo(0, sy); ctx.lineTo(wrap.clientWidth, sy);
      }
      ctx.stroke();
    }
    // axes
    ctx.strokeStyle = "#333";
    ctx.lineWidth = 1;
    ctx.beginPath();
    const [ox, oy] = project([0, 0, 0]);
    ctx.moveTo(0, oy); ctx.lineTo(wrap.clientWidth, oy);
    ctx.moveTo(ox, 0); ctx.lineTo(ox, wrap.clientHeight);
    ctx.stroke();
  }

  function draw() {
    drawGrid();
    if (!strips.length) return;
    for (let i = 0; i < strips.length; i++) {
      const s = strips[i];
      const [sx, sy] = project(s.geometry.start);
      const [ex, ey] = project(s.geometry.end);
      const sel = (i === selectedIdx);
      ctx.strokeStyle = colorFor(i);
      ctx.lineWidth = sel ? 4 : 2;
      ctx.globalAlpha = sel ? 1.0 : 0.85;
      ctx.beginPath();
      ctx.moveTo(sx, sy); ctx.lineTo(ex, ey);
      ctx.stroke();
      // tick marks every ~10 LEDs to give a sense of density
      const n = s.pixel_count;
      const reversed = !!s.reversed;
      const tickEvery = Math.max(1, Math.floor(n / 12));
      for (let k = 0; k < n; k += tickEvery) {
        const t = (n > 1) ? k / (n - 1) : 0;
        const tt = reversed ? 1 - t : t;
        const x = sx + (ex - sx) * tt;
        const y = sy + (ey - sy) * tt;
        ctx.fillStyle = colorFor(i);
        ctx.beginPath();
        ctx.arc(x, y, sel ? 2 : 1.5, 0, Math.PI * 2);
        ctx.fill();
      }
      // chain-head marker (square at start, triangle at end)
      ctx.fillStyle = colorFor(i);
      ctx.fillRect(sx - 5, sy - 5, 10, 10);
      ctx.beginPath();
      ctx.arc(ex, ey, 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1.0;
      // label
      ctx.fillStyle = "#ddd";
      ctx.font = "11px ui-monospace, Menlo, monospace";
      const mx = (sx + ex) / 2, my = (sy + ey) / 2;
      ctx.fillText(s.id, mx + 4, my - 4);
    }
  }

  function hitTestEndpoint(px, py) {
    const r2 = 14 * 14;
    for (let i = 0; i < strips.length; i++) {
      const [sx, sy] = project(strips[i].geometry.start);
      const [ex, ey] = project(strips[i].geometry.end);
      const ds = (sx - px) ** 2 + (sy - py) ** 2;
      const de = (ex - px) ** 2 + (ey - py) ** 2;
      if (ds <= r2 && ds <= de) return { stripIdx: i, end: "start" };
      if (de <= r2) return { stripIdx: i, end: "end" };
    }
    return null;
  }

  function hitTestStrip(px, py) {
    // Distance from point to segment, return closest within 8 px.
    let best = -1, bestD = 8 * 8;
    for (let i = 0; i < strips.length; i++) {
      const [sx, sy] = project(strips[i].geometry.start);
      const [ex, ey] = project(strips[i].geometry.end);
      const dx = ex - sx, dy = ey - sy;
      const len2 = dx * dx + dy * dy || 1;
      let t = ((px - sx) * dx + (py - sy) * dy) / len2;
      t = Math.max(0, Math.min(1, t));
      const cx = sx + t * dx, cy = sy + t * dy;
      const d = (px - cx) ** 2 + (py - cy) ** 2;
      if (d < bestD) { bestD = d; best = i; }
    }
    return best;
  }

  canvas.addEventListener("mousedown", (e) => {
    const rect = canvas.getBoundingClientRect();
    const px = e.clientX - rect.left, py = e.clientY - rect.top;
    const ep = hitTestEndpoint(px, py);
    if (ep) {
      drag = ep;
      selectedIdx = ep.stripIdx;
      renderSidePanel();
      draw();
      return;
    }
    const hit = hitTestStrip(px, py);
    if (hit >= 0) {
      selectedIdx = hit;
      renderSidePanel();
      draw();
    }
  });

  canvas.addEventListener("mousemove", (e) => {
    const rect = canvas.getBoundingClientRect();
    const px = e.clientX - rect.left, py = e.clientY - rect.top;
    if (drag) {
      const s = strips[drag.stripIdx];
      const z = (drag.end === "start") ? s.geometry.start[2] : s.geometry.end[2];
      const p = unproject(px, py, z);
      // snap to 0.05m for clean values
      p[0] = Math.round(p[0] * 20) / 20;
      p[1] = Math.round(p[1] * 20) / 20;
      if (drag.end === "start") s.geometry.start = p;
      else s.geometry.end = p;
      computeBbox();
      draw();
      renderSidePanel();
      return;
    }
    canvas.style.cursor = hitTestEndpoint(px, py) ? "grab" : "default";
  });
  window.addEventListener("mouseup", () => { drag = null; });

  // ---- side panel ----

  function renderSidePanel() {
    stripsDiv.innerHTML = "";
    strips.forEach((s, i) => {
      const card = document.createElement("div");
      card.className = "strip-card" + (i === selectedIdx ? " selected" : "");
      card.innerHTML = `
        <div class="header">
          <div class="swatch" style="background:${colorFor(i)}"></div>
          <input class="id-input" data-i="${i}" data-k="id" type="text" value="${escapeHtml(s.id)}" />
        </div>
        <div class="row2">
          <div>
            <label>controller</label>
            <input data-i="${i}" data-k="controller" type="text" value="${escapeHtml(s.controller)}" />
          </div>
          <div>
            <label>output</label>
            <input data-i="${i}" data-k="output" type="number" min="1" value="${s.output}" />
          </div>
        </div>
        <div class="row2">
          <div>
            <label>pixel_offset</label>
            <input data-i="${i}" data-k="pixel_offset" type="number" min="0" value="${s.pixel_offset}" />
          </div>
          <div>
            <label>pixel_count</label>
            <input data-i="${i}" data-k="pixel_count" type="number" min="1" value="${s.pixel_count}" />
          </div>
        </div>
        <div class="row2">
          <div>
            <label>leds_per_meter</label>
            <input data-i="${i}" data-k="leds_per_meter" type="number" step="0.5" min="0.1" value="${s.leds_per_meter}" />
          </div>
          <div>
            <label>reversed</label>
            <input data-i="${i}" data-k="reversed" type="checkbox" ${s.reversed ? "checked" : ""} />
          </div>
        </div>
        <label>start (x, y, z)</label>
        <div class="row3">
          <input data-i="${i}" data-k="start.0" type="number" step="0.05" value="${s.geometry.start[0]}" />
          <input data-i="${i}" data-k="start.1" type="number" step="0.05" value="${s.geometry.start[1]}" />
          <input data-i="${i}" data-k="start.2" type="number" step="0.05" value="${s.geometry.start[2]}" />
        </div>
        <label>end (x, y, z)</label>
        <div class="row3">
          <input data-i="${i}" data-k="end.0" type="number" step="0.05" value="${s.geometry.end[0]}" />
          <input data-i="${i}" data-k="end.1" type="number" step="0.05" value="${s.geometry.end[1]}" />
          <input data-i="${i}" data-k="end.2" type="number" step="0.05" value="${s.geometry.end[2]}" />
        </div>
      `;
      card.addEventListener("click", () => { selectedIdx = i; renderSidePanelHighlight(); draw(); });
      stripsDiv.appendChild(card);
    });
    stripsDiv.querySelectorAll("input").forEach((inp) => {
      inp.addEventListener("input", onFieldEdit);
      inp.addEventListener("change", onFieldEdit);
    });
  }

  // Lighter re-render: only flip the .selected class, no DOM rebuild.
  function renderSidePanelHighlight() {
    [...stripsDiv.children].forEach((c, i) => {
      c.classList.toggle("selected", i === selectedIdx);
    });
  }

  function onFieldEdit(e) {
    const i = parseInt(e.target.dataset.i, 10);
    const k = e.target.dataset.k;
    const s = strips[i];
    if (k === "reversed") { s.reversed = e.target.checked; }
    else if (k === "id" || k === "controller") { s[k] = e.target.value; }
    else if (k === "output" || k === "pixel_offset" || k === "pixel_count") {
      s[k] = parseInt(e.target.value, 10);
    } else if (k === "leds_per_meter") {
      s[k] = parseFloat(e.target.value);
    } else if (k.startsWith("start.") || k.startsWith("end.")) {
      const [w, j] = k.split(".");
      s.geometry[w][parseInt(j, 10)] = parseFloat(e.target.value);
    }
    computeBbox();
    draw();
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
  }

  // ---- diff + save ----

  function computeDiff() {
    const before = JSON.stringify(baseConfig.strips, null, 2).split("\n");
    const after  = JSON.stringify(strips, null, 2).split("\n");
    // Cheap line-by-line diff (good enough for visual confirmation).
    const out = [];
    const max = Math.max(before.length, after.length);
    for (let i = 0; i < max; i++) {
      const a = before[i], b = after[i];
      if (a === b) { out.push("  " + (a ?? "")); }
      else {
        if (a !== undefined) out.push(`<span class="del">- ${escapeHtml(a)}</span>`);
        if (b !== undefined) out.push(`<span class="add">+ ${escapeHtml(b)}</span>`);
      }
    }
    return out.join("\n");
  }

  document.getElementById("btn-preview").addEventListener("click", () => {
    diffEl.innerHTML = computeDiff();
  });

  document.getElementById("btn-revert").addEventListener("click", () => {
    if (!baseConfig) return;
    strips = JSON.parse(JSON.stringify(baseConfig.strips));
    computeBbox();
    renderSidePanel();
    draw();
    diffEl.textContent = "— reverted —";
    setStatus("reverted to last saved", "warn");
  });

  document.getElementById("btn-save").addEventListener("click", async () => {
    setStatus("saving…");
    const r = await fetch("/config", {
      method: "PUT",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ strips: strips }),
    });
    const body = await r.json().catch(() => ({}));
    if (!r.ok) {
      setStatus("save failed: " + (body.detail ? JSON.stringify(body.detail) : r.status), "bad");
      return;
    }
    // Refresh baseConfig so the next diff is against what's now on disk.
    await loadConfig();
    diffEl.textContent = "— saved —";
    setStatus("saved → " + (body.saved_to || "in-memory only"), "ok");
  });

  async function loadConfig() {
    const r = await fetch("/config");
    if (!r.ok) { setStatus("config fetch failed", "bad"); return; }
    baseConfig = await r.json();
    strips = JSON.parse(JSON.stringify(baseConfig.strips));
    computeBbox();
    renderSidePanel();
    draw();
  }

  async function init() {
    await loadConfig();
    resize();
  }

  init();
})();
</script>
</body>
</html>
