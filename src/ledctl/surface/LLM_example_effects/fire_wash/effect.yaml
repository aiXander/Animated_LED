name: fire_wash
summary: Organic fire flicker across the whole rig, hotter on the bottom row; bass
  fans the flames continuously.
params:
- key: palette
  label: Palette
  control: palette
  default: fire
- key: flicker_speed
  label: Flicker speed
  control: slider
  min: 0.1
  max: 4.0
  step: 0.05
  default: 1.0
- key: base_glow
  label: Base glow
  control: slider
  min: 0.0
  max: 1.0
  step: 0.01
  default: 0.35
  help: Brightness floor when the music is silent; bass fills the rest.
