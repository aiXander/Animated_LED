name: twin_comets_with_sparkles
summary: Two comets (top red, bottom blue), each leaving fading sparkle trails. Brightness pulses on audio.
source: bundled
created_at: 0
updated_at: 0
params:
  - key: leader_color
    label: Top comet colour
    control: color
    default: "#ff2020"
  - key: follower_color
    label: Bottom comet colour
    control: color
    default: "#1040ff"
  - key: lead_offset
    label: Top–bottom lead
    control: slider
    min: 0.0
    max: 0.5
    step: 0.01
    default: 0.1667
  - key: comet_rate
    label: Comet speed (cycles/s)
    control: slider
    min: 0.05
    max: 2.0
    step: 0.01
    default: 0.4
  - key: sparkle_decay
    label: Sparkle fade time (s)
    control: slider
    min: 0.1
    max: 5.0
    step: 0.05
    default: 1.5
  - key: head_size
    label: Comet head size
    control: slider
    min: 0.005
    max: 0.1
    step: 0.001
    default: 0.03
  - key: audio_band
    label: Brightness driver
    control: select
    options:
      - low
      - mid
      - high
    default: low
param_values:
  leader_color: "#ff2020"
  follower_color: "#1040ff"
  lead_offset: 0.1667
  comet_rate: 0.4
  sparkle_decay: 1.5
  head_size: 0.03
  audio_band: low
