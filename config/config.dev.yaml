project:
  name: festival_scaffold_dev
  target_fps: 60

server:
  host: 127.0.0.1
  port: 8000

controllers:
  gledopto_main:
    type: wled-ddp
    host: 127.0.0.1
    port: 4048
    pixel_count: 1800

# Centre-feed: 4 outputs of 450 LEDs each. All chains start at x=0
# (Gledopto sits at the 15m mark) and run outward to ±15m.
# Top row at y=+0.5m, bottom row at y=-0.5m. Origin between rows.
strips:
  - id: top_left
    controller: gledopto_main
    output: 1
    pixel_offset: 0
    pixel_count: 450
    leds_per_meter: 30
    geometry: { type: line, start: [0.0, 0.5, 0.0], end: [-15.0, 0.5, 0.0] }

  - id: top_right
    controller: gledopto_main
    output: 2
    pixel_offset: 450
    pixel_count: 450
    leds_per_meter: 30
    geometry: { type: line, start: [0.0, 0.5, 0.0], end: [15.0, 0.5, 0.0] }

  - id: bottom_left
    controller: gledopto_main
    output: 3
    pixel_offset: 900
    pixel_count: 450
    leds_per_meter: 30
    geometry: { type: line, start: [0.0, -0.5, 0.0], end: [-15.0, -0.5, 0.0] }

  - id: bottom_right
    controller: gledopto_main
    output: 4
    pixel_offset: 1350
    pixel_count: 450
    leds_per_meter: 30
    geometry: { type: line, start: [0.0, -0.5, 0.0], end: [15.0, -0.5, 0.0] }

transport:
  mode: simulator
  sim:
    ws_path: /ws/frames
