project:
  name: festival_scaffold_dev
  target_fps: 60
server:
  host: 127.0.0.1
  port: 8000
controllers:
  gledopto_main:
    type: wled-ddp
    host: 127.0.0.1
    port: 4048
    pixel_count: 1800
strips:
- id: top_left
  controller: gledopto_main
  output: 1
  pixel_offset: 0
  pixel_count: 450
  leds_per_meter: 30.0
  geometry:
    type: line
    start:
    - 0.0
    - 0.5
    - 0.0
    end:
    - -15.0
    - 0.5
    - 0.0
  reversed: false
- id: top_right
  controller: gledopto_main
  output: 2
  pixel_offset: 450
  pixel_count: 450
  leds_per_meter: 30.0
  geometry:
    type: line
    start:
    - 0.0
    - 0.5
    - 0.0
    end:
    - 15.0
    - 0.5
    - 0.0
  reversed: false
- id: bottom_left
  controller: gledopto_main
  output: 3
  pixel_offset: 900
  pixel_count: 450
  leds_per_meter: 30.0
  geometry:
    type: line
    start:
    - 0.0
    - -0.5
    - 0.0
    end:
    - -15.0
    - -0.5
    - 0.0
  reversed: false
- id: bottom_right
  controller: gledopto_main
  output: 4
  pixel_offset: 1350
  pixel_count: 450
  leds_per_meter: 30.0
  geometry:
    type: line
    start:
    - 0.0
    - -0.5
    - 0.0
    end:
    - 15.0
    - -0.5
    - 0.0
  reversed: false
transport:
  mode: simulator
  sim:
    ws_path: /ws/frames
output:
  gamma: 1.5
  lut_size: 256
audio_server:
  # External audio-feature server (Realtime_PyAudio_FFT). On boot ledctl
  # spawns the `audio-server` console script and listens for /audio/lmh on
  # OSC. Pick the input device, retune bands, save presets at the audio
  # server's UI (default http://127.0.0.1:8766) — there is no LED-side mic
  # config any more. If the subprocess fails or the OSC stream stops, the
  # render loop keeps running with audio_band returning 0 + a warning in
  # this terminal.
  enabled: true
  autostart: true
  # Launch via `python -m server.main` from the Realtime_PyAudio_FFT
  # checkout — the bridge rewrites a bare `python` token to sys.executable,
  # so this always uses the same interpreter (and its installed deps) that
  # ledctl itself is running under, regardless of PATH / venv activation.
  command: ["python", "-m", "server.main"]
  # The audio-server reads + writes its own config.yaml next to its cwd.
  # Point at the source checkout so its on-disk settings (device, band
  # cutoffs, smoothing) persist there instead of polluting this repo.
  working_dir: /Users/xandersteenbrugge/Documents/GitHub/Realtime_PyAudio_FFT
  osc_listen_host: 127.0.0.1
  osc_listen_port: 9000
  ui_url: http://127.0.0.1:8766
  stale_after_s: 1.5
agent:
  enabled: true
  provider: openrouter
  base_url: https://openrouter.ai/api/v1
  model: google/gemini-3.1-flash-lite-preview
  history_max_messages: 5
  request_timeout_seconds: 20.0
  rate_limit_per_minute: 10
  default_crossfade_seconds: 5.0
  api_key_env: OPENROUTER_API_KEY
  debug_logging: true
  retry_on_tool_error: 2
masters:
  brightness: 1.0
  speed: 1.0
  audio_reactivity: 1.0
  saturation: 1.0
