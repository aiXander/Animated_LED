project:
  name: festival_scaffold_dev
  target_fps: 40
server:
  host: 127.0.0.1
  port: 8000
controllers:
  gledopto_main:
    type: wled-ddp
    host: 127.0.0.1
    port: 4048
    pixel_count: 1800
strips:
- id: top_left
  controller: gledopto_main
  output: 1
  pixel_offset: 0
  pixel_count: 450
  leds_per_meter: 30.0
  geometry:
    type: line
    start:
    - 0.0
    - 0.5
    - 0.0
    end:
    - -15.0
    - 0.5
    - 0.0
  reversed: false
- id: top_right
  controller: gledopto_main
  output: 2
  pixel_offset: 450
  pixel_count: 450
  leds_per_meter: 30.0
  geometry:
    type: line
    start:
    - 0.0
    - 0.5
    - 0.0
    end:
    - 15.0
    - 0.5
    - 0.0
  reversed: false
- id: bottom_left
  controller: gledopto_main
  output: 3
  pixel_offset: 900
  pixel_count: 450
  leds_per_meter: 30.0
  geometry:
    type: line
    start:
    - 0.0
    - -0.5
    - 0.0
    end:
    - -15.0
    - -0.5
    - 0.0
  reversed: false
- id: bottom_right
  controller: gledopto_main
  output: 4
  pixel_offset: 1350
  pixel_count: 450
  leds_per_meter: 30.0
  geometry:
    type: line
    start:
    - 0.0
    - -0.5
    - 0.0
    end:
    - 15.0
    - -0.5
    - 0.0
  reversed: false
transport:
  mode: simulator
  sim:
    ws_path: /ws/frames
output:
  gamma: 1.5
  lut_size: 256
audio:
  enabled: true
  device: null
  samplerate: 48000
  blocksize: 128
  fft_window: 512
  channels: 1
  gain: 1.0
agent:
  enabled: true
  provider: openrouter
  base_url: https://openrouter.ai/api/v1
  model: google/gemini-3.1-flash-lite-preview
  history_max_messages: 5
  request_timeout_seconds: 20.0
  rate_limit_per_minute: 10
  default_crossfade_seconds: 5.0
  api_key_env: OPENROUTER_API_KEY
  debug_logging: true
  retry_on_tool_error: 2
masters:
  brightness: 1.0
  speed: 1.0
  audio_reactivity: 1.0
  audio_feature_cleaning: 1.0
  saturation: 1.0
  freeze: false
