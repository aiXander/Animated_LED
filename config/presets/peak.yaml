crossfade_seconds: 1.5
masters:
  brightness: 1.0
  speed: 1.0
  audio_reactivity: 1.0
  saturation: 1.0
  freeze: false
layers:
  - blend: normal
    opacity: 1.0
    node:
      kind: palette_lookup
      params:
        scalar:
          kind: wave
          params:
            axis: x
            speed: 1.5
            wavelength: 0.5
            shape: cosine
            softness: 1.0
        palette: fire
        brightness:
          kind: range_map
          params:
            input: {kind: audio_band, params: {band: low}}
            in_min: 0.0
            in_max: 1.0
            out_min: 0.3
            out_max: 1.0
  - blend: screen
    opacity: 0.7
    node:
      kind: sparkles
      params:
        palette: mono_ffffff
        density: 0.4
        decay: 2.5
        seed: 11
        brightness:
          kind: range_map
          params:
            input: {kind: audio_band, params: {band: high}}
            in_min: 0.0
            in_max: 1.0
            out_min: 0.0
            out_max: 1.0
