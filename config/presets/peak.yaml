crossfade_seconds: 1.5
layers:
  - effect: scroll
    blend: normal
    opacity: 1.0
    params:
      axis: x
      speed: 1.5
      wavelength: 0.5
      shape: cosine
      softness: 1.0
      palette: fire
      bindings:
        brightness:
          source: audio.low
          floor: 0.3
          ceiling: 1.0
          gain: 4.0
          release_ms: 300
  - effect: sparkle
    blend: screen
    opacity: 0.7
    params:
      density: 0.4
      decay: 2.5
      seed: 11
      palette: mono_ffffff
      bindings:
        brightness:
          source: audio.high
          floor: 0.0
          ceiling: 1.0
          gain: 6.0
