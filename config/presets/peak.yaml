crossfade_seconds: 1.5
layers:
  - blend: normal
    opacity: 1.0
    node:
      kind: palette_lookup
      params:
        scalar:
          kind: wave
          params:
            axis: x
            speed: 1.5
            wavelength: 0.5
            shape: cosine
            softness: 1.0
        palette: fire
        brightness:
          kind: envelope
          params:
            input: {kind: audio_band, params: {band: low}}
            attack_ms: 30
            release_ms: 300
            gain: 4.0
            floor: 0.3
            ceiling: 1.0
  - blend: screen
    opacity: 0.7
    node:
      kind: sparkles
      params:
        palette: mono_ffffff
        density: 0.4
        decay: 2.5
        seed: 11
        brightness:
          kind: envelope
          params:
            input: {kind: audio_band, params: {band: high}}
            attack_ms: 30
            release_ms: 500
            gain: 6.0
            floor: 0.0
            ceiling: 1.0
