crossfade_seconds: 3.7
masters:
  brightness: 1.0
  speed: 1.87
  audio_reactivity: 3.0
  saturation: 0.7
  freeze: false
layers:
- blend: normal
  opacity: 1.0
  node:
    kind: palette_lookup
    params:
      scalar:
        kind: wave
        params:
          axis: x
          speed: 0.03
          wavelength: 3.0
          shape: cosine
          softness: 1.0
          cross_phase: [0.0, 0.08, 0.0]
      palette: sunset
      brightness:
        kind: pulse
        params:
          by: { kind: audio_band, params: { band: low } }
          floor: 0.6
