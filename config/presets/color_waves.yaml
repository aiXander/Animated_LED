crossfade_seconds: 5.0
masters:
  brightness: 1.0
  speed: 1.0
  audio_reactivity: 1.0
  saturation: 1.0
  freeze: false
layers:
- blend: normal
  opacity: 1.0
  node:
    kind: palette_lookup
    params:
      palette: rainbow
      scalar:
        kind: wave
        params:
          axis: x
          speed: 0.3
          wavelength: 1
          shape: cosine
          softness: 1
          cross_phase: [0, 0.15, 0]
      brightness:
        kind: pulse
        params:
          by: { kind: audio_band, params: { band: low } }
          floor: 0.65
