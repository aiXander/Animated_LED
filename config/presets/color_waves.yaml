crossfade_seconds: 5.0
masters:
  brightness: 1.0
  speed: 1.0
  audio_reactivity: 1.0
  saturation: 1.0
  freeze: false
layers:
- blend: normal
  opacity: 1.0
  node:
    kind: palette_lookup
    params:
      brightness:
        params:
          input:
            params:
              band: low
            kind: audio_band
          in_min: 0.0
          in_max: 1.0
          out_min: 0.65
          out_max: 1.0
        kind: range_map
      palette: rainbow
      scalar:
        params:
          softness: 1
          speed: 0.3
          shape: cosine
          wavelength: 1
          cross_phase:
          - 0
          - 0.15
          - 0
          axis: x
        kind: wave
