crossfade_seconds: 5.0
masters:
  brightness: 1.0
  speed: 1.56
  audio_reactivity: 0.78
  saturation: 1.0
  freeze: false
layers:
- blend: add
  opacity: 1.0
  node:
    kind: sparkles
    params:
      density: 0.5
      seed: 42
      decay: 2
      palette:
        kind: palette_stops
        params:
          stops:
          - { pos: 0, color: '#ffffff' }
          - { pos: 1, color: '#add8e6' }
      brightness:
        kind: pulse
        params:
          by: { kind: audio_band, params: { band: high } }
          floor: 0.3
