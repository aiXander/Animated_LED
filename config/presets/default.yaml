crossfade_seconds: 0.0
masters:
  brightness: 1.0
  speed: 1.0
  audio_reactivity: 1.0
  saturation: 1.0
  freeze: false
layers:
  - blend: normal
    opacity: 1.0
    node:
      kind: palette_lookup
      params:
        scalar:
          kind: wave
          params:
            axis: x
            speed: 0.15
            wavelength: 1.5
            shape: cosine
            softness: 1.0
            cross_phase: [0.0, 0.075, 0.0]
        palette:
          kind: palette_stops
          params:
            stops:
              - {pos: 0.0, color: "#ff2000"}
              - {pos: 0.4, color: "#ff8000"}
              - {pos: 0.7, color: "#ffdd00"}
              - {pos: 1.0, color: "#ffffff"}
        brightness:
          kind: pulse
          params:
            by: { kind: audio_band, params: { band: low } }
            floor: 0.65
