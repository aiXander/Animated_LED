crossfade_seconds: 5.0
masters:
  brightness: 1.0
  speed: 1.0
  audio_reactivity: 1.0
  audio_feature_cleaning: 1.0
  saturation: 1.0
  freeze: false
layers:
- blend: normal
  opacity: 0.7
  node:
    kind: palette_lookup
    params:
      palette:
        params:
          stops:
          - pos: 0
            hue: 180
          - pos: 0.5
            hue: 300
          - hue: 180
            pos: 1
        kind: palette_hsv
      brightness: 0.6
      scalar:
        params:
          shape: sawtooth
          cross_phase:
          - 0
          - 0.25
          - 0
          axis: x
          speed: 0.05
          wavelength: 1
        kind: wave
