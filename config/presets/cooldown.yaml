crossfade_seconds: 3.0
masters:
  brightness: 1.0
  speed: 1.0
  audio_reactivity: 1.0
  saturation: 1.0
  freeze: false
layers:
  - blend: normal
    opacity: 1.0
    node:
      kind: palette_lookup
      params:
        scalar:
          kind: wave
          params:
            axis: x
            speed: 0.03
            wavelength: 3.0
            shape: cosine
            softness: 1.0
            cross_phase: [0.0, 0.08, 0.0]
        palette: sunset
        brightness:
          kind: envelope
          params:
            input: {kind: audio_band, params: {band: rms}}
            attack_ms: 30
            release_ms: 1200
            gain: 2.0
            floor: 0.6
            ceiling: 1.0
