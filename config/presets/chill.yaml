crossfade_seconds: 2.0
masters:
  brightness: 1.0
  speed: 1.0
  audio_reactivity: 1.0
  saturation: 1.0
  freeze: false
layers:
  - blend: normal
    opacity: 1.0
    node:
      kind: palette_lookup
      params:
        scalar:
          kind: wave
          params:
            axis: x
            speed: 0.05
            wavelength: 2.0
            shape: cosine
            softness: 1.0
            cross_phase: [0.0, 0.05, 0.0]
        palette: ocean
        brightness:
          kind: pulse
          params:
            by: { kind: audio_band, params: { band: low } }
            floor: 0.6
  - blend: add
    opacity: 0.5
    node:
      kind: sparkles
      params:
        palette: mono_a8c0ff
        density: 0.05
        decay: 1.2
        seed: 7
