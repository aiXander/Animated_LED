crossfade_seconds: 3.7
masters:
  brightness: 1.0
  speed: 0.68
  audio_reactivity: 1.62
  audio_feature_cleaning: 1.0
  saturation: 0.74
  freeze: false
layers:
- blend: normal
  opacity: 1.0
  node:
    kind: palette_lookup
    params:
      scalar:
        params:
          shape: cosine
          axis: x
          speed: 0.1
          wavelength: 1
          cross_phase:
          - 0
          - 0.5
          - 0
        kind: wave
      brightness: 1
      palette:
        kind: palette_stops
        params:
          stops:
          - color: '#000000'
            pos: 0
          - color: '#ff0000'
            pos: 0.5
          - pos: 1
            color: '#000000'
      hue_shift: 0
- blend: add
  opacity: 1.0
  node:
    kind: palette_lookup
    params:
      palette: mono_0000ff
      brightness:
        kind: envelope
        params:
          input:
            kind: audio_band
            params:
              band: low
          release_ms: 500
          ceiling: 0.45
          curve: sqrt
          gain: 1.5
          attack_ms: 50
      hue_shift: 0
      scalar:
        params:
          value: 1
        kind: constant
