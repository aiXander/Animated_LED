crossfade_seconds: 3.7
masters:
  brightness: 1.0
  speed: 0.68
  audio_reactivity: 1.62
  saturation: 0.74
  freeze: false
layers:
- blend: normal
  opacity: 1.0
  node:
    kind: palette_lookup
    params:
      scalar:
        kind: wave
        params:
          shape: cosine
          axis: x
          speed: 0.1
          wavelength: 1
          cross_phase: [0, 0.5, 0]
      palette:
        kind: palette_stops
        params:
          stops:
          - { pos: 0, color: '#000000' }
          - { pos: 0.5, color: '#ff0000' }
          - { pos: 1, color: '#000000' }
      hue_shift: 0
- blend: add
  opacity: 0.45
  node:
    kind: palette_lookup
    params:
      palette: mono_0000ff
      scalar:
        kind: constant
        params: { value: 1 }
      brightness:
        kind: pulse
        params:
          by: { kind: audio_band, params: { band: low } }
          floor: 0.0
      hue_shift: 0
