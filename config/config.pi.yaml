project:
  name: festival_scaffold
  target_fps: 40

server:
  host: 0.0.0.0
  port: 8000

controllers:
  gledopto_main:
    type: wled-ddp
    host: 10.0.0.2
    port: 4048
    pixel_count: 1800

strips:
  - id: top_left
    controller: gledopto_main
    output: 1
    pixel_offset: 0
    pixel_count: 450
    leds_per_meter: 30
    geometry: { type: line, start: [0.0, 0.5, 0.0], end: [-15.0, 0.5, 0.0] }

  - id: top_right
    controller: gledopto_main
    output: 2
    pixel_offset: 450
    pixel_count: 450
    leds_per_meter: 30
    geometry: { type: line, start: [0.0, 0.5, 0.0], end: [15.0, 0.5, 0.0] }

  - id: bottom_left
    controller: gledopto_main
    output: 3
    pixel_offset: 900
    pixel_count: 450
    leds_per_meter: 30
    geometry: { type: line, start: [0.0, -0.5, 0.0], end: [-15.0, -0.5, 0.0] }

  - id: bottom_right
    controller: gledopto_main
    output: 4
    pixel_offset: 1350
    pixel_count: 450
    leds_per_meter: 30
    geometry: { type: line, start: [0.0, -0.5, 0.0], end: [15.0, -0.5, 0.0] }

transport:
  mode: ddp
  sim:
    ws_path: /ws/frames

audio:
  enabled: true
  # Set this to the INMP441 ALSA card name once Phase 8 wires it up
  # (e.g. "snd_rpi_simple_card" or whatever `arecord -l` shows).
  device: null
  samplerate: 48000
  blocksize: 128
  fft_window: 512
  channels: 1
  gain: 1.0

agent:
  enabled: true
  provider: openrouter
  base_url: https://openrouter.ai/api/v1
  model: google/gemini-3.1-flash-lite-preview
  history_max_messages: 5
  request_timeout_seconds: 20
  rate_limit_per_minute: 10
  default_crossfade_seconds: 5.0
  api_key_env: OPENROUTER_API_KEY
  retry_on_tool_error: 1
