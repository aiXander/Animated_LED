project:
  name: festival_scaffold
  target_fps: 60
server:
  host: 0.0.0.0
  port: 8000
# Shared-password gate for the operator UI (Phase 7/8). Anyone on the venue
# WiFi can reach the Pi at port 8000, so don't ship without this set. The
# render loop and DDP path are not affected by auth — this only protects the
# HTML/REST/WS surface.
auth:
  password: kaailed
controllers:
  gledopto_main:
    type: wled-ddp
    host: 10.0.0.2
    port: 4048
    pixel_count: 1800
strips:
- id: top_left
  controller: gledopto_main
  output: 1
  pixel_offset: 1350
  pixel_count: 450
  leds_per_meter: 30.0
  geometry:
    type: line
    start:
    - 0.0
    - 0.5
    - 0.0
    end:
    - -15.0
    - 0.5
    - 0.0
  reversed: false
- id: top_right
  controller: gledopto_main
  output: 2
  pixel_offset: 0
  pixel_count: 450
  leds_per_meter: 30.0
  geometry:
    type: line
    start:
    - 0.0
    - 0.5
    - 0.0
    end:
    - 15.0
    - 0.5
    - 0.0
  reversed: false
- id: bottom_left
  controller: gledopto_main
  output: 3
  pixel_offset: 900
  pixel_count: 450
  leds_per_meter: 30.0
  geometry:
    type: line
    start:
    - 0.0
    - -0.5
    - 0.0
    end:
    - -15.0
    - -0.5
    - 0.0
  reversed: false
- id: bottom_right
  controller: gledopto_main
  output: 4
  pixel_offset: 450
  pixel_count: 450
  leds_per_meter: 30.0
  geometry:
    type: line
    start:
    - 0.0
    - -0.5
    - 0.0
    end:
    - 15.0
    - -0.5
    - 0.0
  reversed: false
transport:
  # `multi` fans every frame to both the browser simulator (so the operator UI
  # at :8000 keeps showing a live preview) and the Gledopto over DDP. Switch
  # to `ddp` only if the sim WS broadcast ever shows up as a measurable cost.
  mode: multi
  sim:
    ws_path: /ws/frames
output:
  # If WLED's own gamma is on, set this to 1.0 to avoid double-gamma. With
  # WLED gamma off (recommended), 1.5 keeps the renderer the single source.
  gamma: 1.5
  lut_size: 256
audio_server:
  # External audio-feature server (Realtime_PyAudio_FFT). On boot ledctl
  # spawns the `audio-server` console script (installed via `pip install -e
  # ".[dev]"` in that repo). Device picking, band cutoffs, smoothing, and
  # save/load presets live in the audio server's own UI at
  # http://<pi>:8766. The 'audio' link in the LED operator UI opens that.
  # If the subprocess fails (e.g. the package isn't installed yet on the
  # Pi), the LED render loop keeps running with audio_band returning 0.
  enabled: true
  autostart: true
  # Absolute path required: systemd doesn't inherit the user shell PATH,
  # so a bare "audio-server" silently fails to resolve under ledctl.service.
  command: ["/home/xander/.local/bin/audio-server"]
  # Resolved relative to this YAML file's directory: from <repo>/config/ this
  # points at <repo>/../Realtime_PyAudio_FFT, the sibling clone of the
  # audio-feature server. Launching the subprocess with that as cwd means
  # the audio-server picks up its own config.yaml (device, band cutoffs,
  # smoothing, presets) from the cloned repo on every boot.
  working_dir: ../../Realtime_PyAudio_FFT
  osc_listen_host: 127.0.0.1
  osc_listen_port: 9000
  ui_url: http://127.0.0.1:8766
  # Used when the operator UI is loaded over the tailnet (https://*.ts.net).
  # Tailscale Serve only allows 443/8443/10000; audio UI is mounted on 10000.
  tailnet_ui_url: https://xanderpi.tail182af2.ts.net:10000/
  stale_after_s: 1.5
agent:
  enabled: true
  provider: openrouter
  base_url: https://openrouter.ai/api/v1
  model: google/gemini-3.1-flash-lite-preview
  history_max_messages: 5
  request_timeout_seconds: 20.0
  rate_limit_per_minute: 10
  default_crossfade_seconds: 5.0
  api_key_env: OPENROUTER_API_KEY
  debug_logging: true
  retry_on_tool_error: 2
masters:
  brightness: 1.0
  speed: 1.0
  audio_reactivity: 1.0
  saturation: 1.0
